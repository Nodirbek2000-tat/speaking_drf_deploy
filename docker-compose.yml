services:

  db:
    image: postgres:15-alpine
    restart: always
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME:-speaking_db}
      POSTGRES_USER: ${DB_USER:-speaking_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-speaking_pass}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    expose:
      - "5432"

  web:
    build: .
    restart: always
    env_file: .env
    volumes:
      - media_volume:/app/media
      - static_volume:/app/staticfiles
    depends_on:
      - redis
      - db
    expose:
      - "8000"

  redis:
    image: redis:7-alpine
    restart: always
    expose:
      - "6379"

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_volume:/app/staticfiles
      - media_volume:/app/media
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    depends_on:
      - web

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done'"

volumes:
  postgres_data:
  media_volume:
  static_volume:
  certbot_www:
  certbot_conf: