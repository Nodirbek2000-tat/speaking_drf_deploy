{% extends 'webapp/base.html' %}
{% load static %}

{% block title %}Leaderboard{% endblock %}

{% block content %}
<div style="padding:20px 20px 8px;display:flex;align-items:center;justify-content:space-between;">
  <div>
    <h1 style="font-size:22px;font-weight:700;color:#fff;margin:0;">🏆 Leaderboard</h1>
    <p style="font-size:13px;color:#9ca3af;margin:4px 0 0;">Oxirgi 30 kun eng faol foydalanuvchilar</p>
  </div>
</div>

<!-- Sort tabs -->
<div style="padding:0 16px 16px;display:flex;gap:8px;overflow-x:auto;">
  <button class="sort-btn active" data-sort="chat_count" onclick="setSort('chat_count')"
    style="padding:7px 14px;border-radius:20px;border:1px solid #6366f1;background:#6366f1;color:#fff;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">
    💬 Calls
  </button>
  <button class="sort-btn" data-sort="avg_rating" onclick="setSort('avg_rating')"
    style="padding:7px 14px;border-radius:20px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">
    ⭐ Rating
  </button>
  <button class="sort-btn" data-sort="practice_count" onclick="setSort('practice_count')"
    style="padding:7px 14px;border-radius:20px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">
    🎤 Practice
  </button>
  <button class="sort-btn" data-sort="ielts_count" onclick="setSort('ielts_count')"
    style="padding:7px 14px;border-radius:20px;border:1px solid #374151;background:transparent;color:#9ca3af;font-size:12px;font-weight:600;cursor:pointer;white-space:nowrap;">
    📝 IELTS
  </button>
</div>

<!-- My rank banner -->
<div id="my-rank-banner" style="margin:0 16px 16px;background:#6366f115;border:1px solid #6366f1;border-radius:14px;padding:12px 16px;display:none;align-items:center;gap:12px;">
  <div id="my-rank-num" style="font-size:20px;font-weight:800;color:#6366f1;width:32px;text-align:center;"></div>
  <div id="my-rank-avatar" style="width:40px;height:40px;border-radius:50%;background:#6366f1;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;"></div>
  <div style="flex:1;">
    <div style="font-size:13px;font-weight:600;color:#a5b4fc;">Sizning o'rningiz</div>
    <div id="my-rank-stats" style="font-size:12px;color:#9ca3af;"></div>
  </div>
</div>

<!-- Leaders list -->
<div id="leaders-list" style="padding:0 16px 100px;">
  <div style="text-align:center;padding:40px;color:#6b7280;font-size:14px;">⏳ Yuklanmoqda...</div>
</div>

<style>
.sort-btn { transition:all 0.2s; }
.leader-card { animation: slideIn 0.3s ease; }
@keyframes slideIn { from{opacity:0;transform:translateX(-10px)} to{opacity:1;transform:translateX(0)} }
</style>

<script>
let currentSort = 'chat_count';
let leadersData = [];

const SORT_LABELS = {
  chat_count: {label:'ta call', icon:'💬'},
  avg_rating: {label:'avg rating', icon:'⭐'},
  practice_count: {label:'ta practice', icon:'🎤'},
  ielts_count: {label:'ta IELTS', icon:'📝'},
};

const MEDALS = {1:'🥇', 2:'🥈', 3:'🥉'};

document.addEventListener('DOMContentLoaded', () => {
  loadLeaderboard();
});

async function loadLeaderboard() {
  try {
    const r = await fetch(`/webapp/bot-api/leaderboard/?sort_by=${currentSort}&limit=30`, {credentials:'include'});
    const data = await r.json();
    leadersData = data.leaders || [];
    const myRank = data.my_rank;

    renderLeaders(leadersData);

    // My rank banner
    if (myRank) {
      document.getElementById('my-rank-banner').style.display = 'flex';
      document.getElementById('my-rank-num').textContent = `#${myRank.rank}`;
      const avatarEl = document.getElementById('my-rank-avatar');
      if (myRank.photo_url) {
        avatarEl.innerHTML = `<img src="${myRank.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">`;
      } else {
        avatarEl.textContent = (myRank.full_name || 'U')[0].toUpperCase();
      }
      const val = myRank[currentSort] || 0;
      const lbl = SORT_LABELS[currentSort];
      document.getElementById('my-rank-stats').textContent = `${val} ${lbl.label} · ⭐ ${myRank.avg_rating || '—'}`;
    }
  } catch(e) {
    document.getElementById('leaders-list').innerHTML =
      '<div style="text-align:center;padding:40px;color:#ef4444;">⚠️ Yuklab bo\'lmadi</div>';
  }
}

function renderLeaders(leaders) {
  const el = document.getElementById('leaders-list');
  if (!leaders.length) {
    el.innerHTML = '<div style="text-align:center;padding:40px;color:#6b7280;font-size:14px;">Hali ma\'lumot yo\'q</div>';
    return;
  }

  const lbl = SORT_LABELS[currentSort];

  // Top 3 podium
  const top3 = leaders.slice(0,3);
  let podiumHtml = `<div style="display:flex;align-items:flex-end;justify-content:center;gap:12px;margin-bottom:24px;padding:16px 0;">`;

  const ORDER = [1, 0, 2]; // 2nd, 1st, 3rd visual order
  const HEIGHTS = [80, 100, 60];

  ORDER.forEach((idx, visualPos) => {
    if (!top3[idx]) return;
    const u = top3[idx];
    const rank = idx + 1;
    const medal = MEDALS[rank];
    const val = u[currentSort] || 0;
    const h = HEIGHTS[visualPos];
    const isFirst = rank === 1;

    podiumHtml += `
    <div style="display:flex;flex-direction:column;align-items:center;flex:1;">
      <div style="position:relative;margin-bottom:8px;">
        <div style="width:${isFirst?'64px':'52px'};height:${isFirst?'64px':'52px'};border-radius:50%;background:#374151;display:flex;align-items:center;justify-content:center;font-size:${isFirst?'24px':'18px'};font-weight:700;color:#fff;overflow:hidden;border:2px solid ${isFirst?'#f59e0b':'#374151'};">
          ${u.photo_url ? `<img src="${u.photo_url}" style="width:100%;height:100%;object-fit:cover;">` : (u.full_name||'U')[0].toUpperCase()}
        </div>
        <div style="position:absolute;top:-8px;right:-8px;font-size:18px;">${medal}</div>
      </div>
      <div style="font-size:11px;font-weight:600;color:#fff;text-align:center;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${u.full_name||u.username||'User'}</div>
      <div style="font-size:12px;color:#6366f1;font-weight:700;">${val} ${lbl.icon}</div>
      ${u.is_premium ? '<div style="font-size:10px;color:#f59e0b;">💎</div>' : ''}
      <div style="width:100%;height:${h}px;background:linear-gradient(to top,#6366f1,#8b5cf6);border-radius:8px 8px 0 0;margin-top:8px;"></div>
    </div>`;
  });
  podiumHtml += '</div>';

  // Rest of list (4-30)
  const restHtml = leaders.slice(3).map((u, i) => {
    const rank = i + 4;
    const val = u[currentSort] || 0;
    const avg = u.avg_rating ? `⭐ ${u.avg_rating}` : '';

    return `
    <div class="leader-card" style="display:flex;align-items:center;gap:12px;background:#1a1a2e;border:1px solid #374151;border-radius:14px;padding:12px 14px;margin-bottom:8px;">
      <div style="width:28px;text-align:center;font-size:14px;font-weight:700;color:#9ca3af;flex-shrink:0;">#${rank}</div>
      <div style="width:44px;height:44px;border-radius:50%;background:#374151;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;overflow:hidden;flex-shrink:0;">
        ${u.photo_url ? `<img src="${u.photo_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;">` : (u.full_name||'U')[0].toUpperCase()}
      </div>
      <div style="flex:1;min-width:0;">
        <div style="font-size:14px;font-weight:600;color:#fff;display:flex;align-items:center;gap:6px;">
          ${u.full_name||u.username||'User'}
          ${u.is_premium ? '<span style="font-size:12px;">💎</span>' : ''}
        </div>
        <div style="font-size:12px;color:#9ca3af;">${avg}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;">
        <div style="font-size:15px;font-weight:700;color:#6366f1;">${val}</div>
        <div style="font-size:11px;color:#9ca3af;">${lbl.label}</div>
      </div>
    </div>`;
  }).join('');

  el.innerHTML = podiumHtml + restHtml;
}

function setSort(sort) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(btn => {
    const isActive = btn.dataset.sort === sort;
    btn.style.background = isActive ? '#6366f1' : 'transparent';
    btn.style.color = isActive ? '#fff' : '#9ca3af';
    btn.style.borderColor = isActive ? '#6366f1' : '#374151';
  });
  document.getElementById('leaders-list').innerHTML =
    '<div style="text-align:center;padding:40px;color:#6b7280;font-size:14px;">⏳ Yuklanmoqda...</div>';
  loadLeaderboard();
}
</script>
{% endblock %}
