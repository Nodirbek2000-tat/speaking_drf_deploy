<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0f0f13">
<title>Speaking Bot</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0f0f13; color: #f1f5f9; font-family: system-ui, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
.loader { text-align: center; padding: 24px; max-width: 320px; width: 100%; }
.logo { font-size: 64px; margin-bottom: 16px; }
.title { font-size: 24px; font-weight: 700; margin-bottom: 8px; }
.subtitle { color: #64748b; font-size: 14px; margin-bottom: 32px; }
.spinner { width: 40px; height: 40px; border: 3px solid #242430; border-top-color: #6366f1; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto; }
@keyframes spin { to { transform: rotate(360deg); } }
.error-box { display: none; margin-top: 20px; background: #1a1a22; border: 1px solid #2e2e3e; border-radius: 16px; padding: 20px; }
.error-title { color: #ef4444; font-size: 15px; font-weight: 600; margin-bottom: 8px; }
.error-text { color: #94a3b8; font-size: 13px; line-height: 1.6; margin-bottom: 16px; }
.open-bot-btn {
  display: block; width: 100%;
  background: #229ED9; color: white; border: none;
  padding: 14px 20px; border-radius: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  text-decoration: none; margin-bottom: 8px;
}
.open-bot-btn:active { background: #1a8ab5; }
.dev-btn {
  display: none; width: 100%;
  background: #6366f1; color: white; border: none;
  padding: 13px 20px; border-radius: 14px;
  font-size: 14px; font-weight: 600; cursor: pointer;
  margin-top: 8px;
}
.dev-btn:active { background: #4f46e5; }
.hint { color: #475569; font-size: 11px; margin-top: 12px; }
</style>
</head>
<body>
<div class="loader">
  <div class="logo">🎤</div>
  <div class="title">Speaking Bot</div>
  <div class="subtitle">Practice English speaking daily</div>
  <div class="spinner" id="spinner"></div>

  <div class="error-box" id="errorBox">
    <div class="error-title">⚠️ Telegram orqali oching</div>
    <div class="error-text" id="errorText">
      Bu ilovani faqat <b>Telegram bot</b> orqali ishlatish mumkin.<br>
      Botga o'ting va <b>🌐 Web App</b> tugmasini bosing.
    </div>
    <a href="https://t.me/tilchi_aibot" class="open-bot-btn" id="openBotBtn">
      📱 Botni ochish
    </a>
    {% if debug %}
    <button class="dev-btn" id="devBtn" onclick="devLogin()">⚙️ Dev Login (DEBUG)</button>
    {% endif %}
    <p class="hint">Speaking Bot — @tilchi_aibot</p>
  </div>
</div>

<script>
async function authenticate(initData) {
  const resp = await fetch('/webapp/auth/', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ initData }),
    credentials: 'same-origin',
  });
  return resp.json();
}

function showError(msg) {
  document.getElementById('spinner').style.display = 'none';
  document.getElementById('errorBox').style.display = 'block';
  if (msg) document.getElementById('errorText').innerHTML = msg;
  {% if debug %}
  document.getElementById('devBtn').style.display = 'block';
  {% endif %}
}

async function init() {
  try {
    if (window.Telegram && window.Telegram.WebApp) {
      Telegram.WebApp.ready();
      Telegram.WebApp.expand();
      const initData = Telegram.WebApp.initData;
      if (initData) {
        const result = await authenticate(initData);
        if (result.ok) {
          window.location.href = result.redirect;
          return;
        }
        // Auth failed — show server error
        {% if debug %}
        showError('Auth xatosi: ' + (result.error || 'Noma\'lum xato') + '<br><small style="color:#475569">DEBUG: initData mavjud lekin tekshiruv o\'tmadi</small>');
        {% else %}
        showError('Autentifikatsiya xatosi. Iltimos qaytadan urinib ko\'ring.<br><a href="/webapp/" style="color:#6366f1;font-size:12px">🔄 Qayta urinish</a>');
        {% endif %}
        return;
      }
    }
  } catch (e) {
    console.error('Auth error:', e);
  }
  // Telegram WebApp yo'q yoki initData bo'sh — browser'da ochilgan
  showError(
    'Bu ilovani faqat <b>Telegram bot</b> orqali ishlatish mumkin.<br>' +
    'Botga o\'ting va <b>🌐 Web App</b> tugmasini bosing.'
  );
}

{% if debug %}
async function devLogin() {
  document.getElementById('devBtn').textContent = '⏳ Kirish...';
  document.getElementById('devBtn').disabled = true;
  try {
    const result = await authenticate('test');
    if (result.ok) {
      window.location.href = result.redirect;
    } else {
      alert('Dev login xatosi: ' + (result.error || 'Noma\'lum xato'));
      document.getElementById('devBtn').textContent = '⚙️ Dev Login (DEBUG)';
      document.getElementById('devBtn').disabled = false;
    }
  } catch(e) {
    alert('Network xatosi: ' + e.message);
    document.getElementById('devBtn').textContent = '⚙️ Dev Login (DEBUG)';
    document.getElementById('devBtn').disabled = false;
  }
}
{% endif %}

init();
</script>
</body>
</html>
