upstream django {
    server web:8000;
}

# ── HTTP: Certbot challenge + HTTPS redirect ───────────────────────────────────
server {
    listen 80;
    server_name ittatuz.uz www.ittatuz.uz;

    # Certbot SSL verification
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Redirect all HTTP → HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ── HTTPS: Main server ────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    server_name ittatuz.uz www.ittatuz.uz;

    ssl_certificate     /etc/letsencrypt/live/ittatuz.uz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/ittatuz.uz/privkey.pem;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Static files
    location /static/ {
        alias /app/staticfiles/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Media files
    location /media/ {
        alias /app/media/;
    }

    # WebSocket (Django Channels)
    location /ws/ {
        proxy_pass http://django;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 86400;
    }

    # Django app
    location / {
        proxy_pass http://django;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60;
        client_max_body_size 20M;
    }
}
